version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - app

    networks:
      - app-network

  app:
    build: ./app

    container_name: app

    environment:
      ALUNO: "Miguel Rocha Xavier"

    mem_limit: 128m

    deploy:
      resources:
        limits:
          memory: 128M

    depends_on:
      - mysql

    networks:
      - app-network

  mysql:
    image: mysql:8.0

    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistemas_operacionais

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge